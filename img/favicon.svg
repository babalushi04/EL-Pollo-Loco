<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Körper -->
  <ellipse cx="50" cy="60" rx="32" ry="35" fill="#DD6B20"/>

  <!-- Kopf -->
  <circle cx="50" cy="30" r="22" fill="#DD6B20"/>

  <!-- Kamm (rot) -->
  <path d="M 45 5 Q 40 0 42 10 Q 38 8 40 18 Q 36 12 42 20" fill="#DC2626"/>
  <path d="M 50 3 Q 48 -2 50 8 Q 47 5 50 15 Q 48 10 50 20" fill="#EF4444"/>
  <path d="M 55 5 Q 60 0 58 10 Q 62 8 60 18 Q 64 12 58 20" fill="#DC2626"/>

  <!-- Auge -->
  <circle cx="57" cy="25" r="4" fill="#000"/>
  <circle cx="58" cy="23" r="1.5" fill="#FFF"/>

  <!-- Schnabel -->
  <polygon points="65,28 75,26 65,32" fill="#FBBF24"/>

  <!-- Kehle (gelb) -->
  <ellipse cx="50" cy="50" rx="18" ry="15" fill="#FBBF24"/>

  <!-- Flügel links -->
  <ellipse cx="30" cy="55" rx="12" ry="20" fill="#B45309" transform="rotate(-20 30 55)"/>

  <!-- Flügel rechts -->
  <ellipse cx="70" cy="55" rx="12" ry="20" fill="#B45309" transform="rotate(20 70 55)"/>

  <!-- Schwanz -->
  <path d="M 25 65 Q 15 50 20 35" stroke="#8B4513" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 20 65 Q 8 45 15 25" stroke="#654321" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Beine -->
  <line x1="42" y1="92" x2="42" y2="100" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="92" x2="58" y2="100" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>

  <!-- Füße -->
  <line x1="38" y1="100" x2="46" y2="100" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="100" x2="62" y2="100" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
</svg>
